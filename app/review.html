<script>
  const textarea = document.querySelector('.popup-textarea');

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
  }

  textarea.addEventListener('input', () => {
    autoResize(textarea);
  });

  autoResize(textarea);
</script>
